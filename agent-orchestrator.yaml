port: 3000
defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: []
projects:
  advanced-MC:
    name: advanced-MC
    sessionPrefix: mc
    repo: littletwolittletwo-ux/advanced-MC
    path: /Users/zhaolinwang/projects/advanced-MC
    defaultBranch: main
    agentRules: |-
      Always run tests before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).
      Link issue numbers in commit messages.
      Write clear commit messages that explain WHY, not just WHAT.
